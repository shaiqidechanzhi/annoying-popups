<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>烦人弹窗控制面板</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1>😈 烦人弹窗控制器</h1>
      <p class="subtitle">视频整活专用 | 关闭按钮可随时退出</p>
    </div>
    
    <div class="control-section">
      <div class="toggle-row">
        <span>弹窗开关</span>
        <label class="switch">
          <input type="checkbox" id="enableToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="frequency-section">
        <label>弹窗频率：</label>
        <select id="frequencySelect">
          <option value="every_click">每次点击/按键都弹</option>
          <option value="random" selected>随机触发</option>
          <option value="interval">定时弹窗</option>
        </select>
        
        <div id="intervalSettings" style="display:none;">
          <label>间隔（秒）：</label>
          <input type="number" id="intervalSeconds" value="30" min="5" max="300">
        </div>
      </div>
    </div>
    
    <div class="action-section">
      <button id="triggerBtn" class="btn btn-trigger">🎯 立即弹一个！</button>
      <button id="triggerManyBtn" class="btn btn-many">💣 弹5个！</button>
      <button id="killSwitchBtn" class="btn btn-kill">🔕 永久关闭（需等10分钟）</button>
      <button id="settingsBtn" class="btn btn-settings">⚙️ 打开设置页面</button>
    </div>
    
    <div id="killSwitchStatus" class="kill-status" style="display:none;">
      <p>🔕 永久关闭倒计时中...</p>
      <p id="killTimer">剩余: --:--</p>
      <button id="cancelKillBtn" class="btn btn-cancel">取消永久关闭</button>
    </div>
    
    <div class="footer">
      <p>✅ 大大的关闭按钮随时可关闭弹窗</p>
      <p>✅ 对浏览器不造成任何伤害</p>
      <p>⚠️ 本项目仅供视频整活</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
